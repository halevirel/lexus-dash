<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד מכירות · לקסוס הרצליה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap');

:root{
  --bg:#0d1117;--panel:#161b22;--panel-2:#1c2230;--line:#262d3a;
  --ink:#e9eef5;--ink-dim:#8b97a8;--accent:#c8a04f;--accent-soft:#d8b878;
  --ok:#3fb27f;--warn:#e0a13c;--alert:#e2564d;--shadow:0 18px 50px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:
  radial-gradient(1100px 600px at 90% -10%, rgba(200,160,79,.10), transparent 60%),
  radial-gradient(900px 500px at -10% 110%, rgba(63,178,127,.06), transparent 60%),var(--bg);
  color:var(--ink);min-height:100vh;padding:28px clamp(14px,4vw,48px);line-height:1.5}
.wrap{max-width:1240px;margin:0 auto}
header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;padding-bottom:22px;border-bottom:1px solid var(--line);margin-bottom:26px}
.brand{display:flex;flex-direction:column;gap:6px}
.brand .kicker{font-size:12px;letter-spacing:.32em;color:var(--accent);font-weight:700}
h1{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:clamp(26px,4vw,40px);letter-spacing:-.5px}
.sub{color:var(--ink-dim);font-size:14px}
.updated{font-size:12.5px;color:var(--ink-dim);text-align:left;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.updated b{color:var(--ink);font-weight:600}
.refresh{background:var(--panel);border:1px solid var(--line);color:var(--accent-soft);padding:6px 14px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:.18s}
.refresh:hover{border-color:var(--accent);color:var(--ink)}
.refresh.spin svg{animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.refresh svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:linear-gradient(160deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi::before{content:'';position:absolute;inset:0 auto 0 0;width:3px;background:var(--accent);opacity:.8}
.kpi .lbl{font-size:12.5px;color:var(--ink-dim);font-weight:500;margin-bottom:8px}
.kpi .val{font-family:'Frank Ruhl Libre',serif;font-size:34px;font-weight:900;line-height:1}
.kpi.alert .val{color:var(--alert)}
.kpi.alert::before{background:var(--alert)}

.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);padding:8px 16px;border-radius:999px;font-size:13.5px;font-weight:500;cursor:pointer;transition:.18s;font-family:inherit}
.chip:hover{border-color:var(--accent);color:var(--ink)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#1a1205;font-weight:700}
.search{margin-inline-start:auto;position:relative}
.search input{background:var(--panel);border:1px solid var(--line);border-radius:999px;color:var(--ink);padding:9px 38px 9px 16px;font-size:13.5px;font-family:inherit;width:230px;outline:none;transition:.18s}
.search input:focus{border-color:var(--accent)}
.search svg{position:absolute;inset-inline-end:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--ink-dim);fill:none;stroke-width:2}

.tablecard{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--panel-2);text-align:right;padding:14px 18px;font-size:12.5px;letter-spacing:.04em;color:var(--ink-dim);font-weight:700;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--accent)}
thead th .arr{font-size:10px;opacity:.6}
tbody td{padding:15px 18px;border-bottom:1px solid var(--line);font-size:14.5px}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}
tbody tr:hover{background:rgba(200,160,79,.05)}
.ordnum{font-variant-numeric:tabular-nums;font-weight:700;color:var(--accent-soft);letter-spacing:.02em}
.cust{font-weight:500}
.agent-tag{display:inline-flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.when{color:var(--ink-dim);font-size:13.5px;font-variant-numeric:tabular-nums}
.when b{color:var(--ink);font-weight:600}
.days{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-variant-numeric:tabular-nums}
.badge{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
.b-ok{background:rgba(63,178,127,.14);color:var(--ok)}
.b-warn{background:rgba(224,161,60,.14);color:var(--warn)}
.b-alert{background:rgba(226,86,77,.16);color:var(--alert)}
tr.row-alert{background:rgba(226,86,77,.06)}
tr.row-alert:hover{background:rgba(226,86,77,.10)}

.state{text-align:center;padding:48px 20px;color:var(--ink-dim)}
.state.err{color:var(--alert)}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:rot 1s linear infinite}
footer{margin-top:22px;text-align:center;color:var(--ink-dim);font-size:12px}
footer b{color:var(--accent-soft)}
@media(max-width:640px){.when .time{display:none}thead th,tbody td{padding:11px 10px;font-size:13px}.search{margin-inline-start:0;width:100%}.search input{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="kicker">LEXUS · מעקב עסקאות</span>
      <h1>דשבורד מכירות</h1>
      <span class="sub">ריכוז הזמנות שנכנסו להכנה — לפי נציג, לקוח ומספר הזמנה</span>
    </div>
    <div class="updated">
      <button class="refresh" id="refreshBtn"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> רענון</button>
      <span>עודכן: <b id="upd">—</b></span>
    </div>
  </header>

  <section class="kpis" id="kpis"></section>

  <div class="controls" id="agentChips"></div>
  <div class="controls" style="margin-top:-6px">
    <div class="search">
      <input id="q" type="text" placeholder="חיפוש לקוח / הזמנה…">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>

  <div class="tablecard">
    <table>
      <thead>
        <tr>
          <th data-k="order">הזמנה <span class="arr"></span></th>
          <th data-k="agent">נציג <span class="arr"></span></th>
          <th data-k="customer">לקוח <span class="arr"></span></th>
          <th data-k="received">נכנס להכנה <span class="arr">▼</span></th>
          <th data-k="days">ימי עסקים <span class="arr"></span></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="state" id="state"><div class="spinner"></div>טוען נתונים מ‑Google Sheet…</div>
  </div>

  <footer>סך הכל <b id="cnt">0</b> הזמנות · התראה אדומה מעל 10 ימי עסקים · סוף שבוע ישראלי (שישי+שבת) לא נספר</footer>
</div>

<script>
/* ============================================================
   הגדרה אחת בלבד — הדבק כאן את כתובת ה-CSV המפורסם מ-Google Sheets
   File → Share → Publish to web → בחר את הלשונית → CSV
   ============================================================ */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJZAw4RffmzSTPeh_8ODe70JgJL0BJYaXnrEHiJmzbcHi50D7jRslAX0IhOHlfRh3t498x6Y036OoT/pub?gid=830358732&single=true&output=csv";

/* עמודות הצפויות ב-Sheet (שמות הכותרות בשורה הראשונה):
   order , agent , customer , received
   received בפורמט: 2026-06-03 14:45  או  2026-06-03T14:45:12 */

const palette = ['#c8a04f','#5aa9e6','#3fb27f','#d98ec0','#e0a13c','#9b8be6','#e2564d'];
let DATA = [];
let agentColor = {};
let state = { agent:'all', q:'', sortKey:'received', sortDir:-1 };

/* ---- CSV parser (תומך בפסיקים בתוך מרכאות) ---- */
function parseCSV(text){
  const rows=[]; let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'&&text[i+1]==='"'){cur+='"';i++;}
      else if(c==='"'){inQ=false;}
      else cur+=c;
    }else{
      if(c==='"')inQ=true;
      else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>x.trim()!==''));
}

function rowsToObjects(rows){
  if(!rows.length)return[];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const idx=name=>head.indexOf(name);
  const iO=idx('order'),iA=idx('agent'),iC=idx('customer'),iR=idx('received');
  return rows.slice(1).map(r=>({
    order:(r[iO]||'').trim(),
    agent:(r[iA]||'').trim(),
    customer:(r[iC]||'').trim(),
    received:(r[iR]||'').trim().replace(' ','T')
  })).filter(o=>o.order);
}

function businessDays(fromISO){
  const start=new Date(fromISO);
  if(isNaN(start)) return 0;
  const today=new Date();
  let d=new Date(start.getFullYear(),start.getMonth(),start.getDate());
  const end=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  let n=0;
  while(d<end){d.setDate(d.getDate()+1);const wd=d.getDay();if(wd!==5&&wd!==6)n++;}
  return n;
}
function fmtDate(iso){
  const d=new Date(iso);
  if(isNaN(d))return{date:iso||'—',time:''};
  const days=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const p=n=>String(n).padStart(2,'0');
  return{date:`יום ${days[d.getDay()]}׳ ${p(d.getDate())}/${p(d.getMonth()+1)}`,time:`${p(d.getHours())}:${p(d.getMinutes())}`};
}
const enrich=r=>({...r,days:businessDays(r.received)});

function render(){
  const rows=DATA.map(enrich)
    .filter(r=>state.agent==='all'||r.agent===state.agent)
    .filter(r=>{if(!state.q)return true;const q=state.q.trim();return r.customer.includes(q)||r.order.includes(q)||r.agent.includes(q);});
  rows.sort((a,b)=>{
    let av=a[state.sortKey],bv=b[state.sortKey];
    if(state.sortKey==='days'){av=a.days;bv=b.days;}
    if(state.sortKey==='received'){av=new Date(a.received);bv=new Date(b.received);}
    if(av<bv)return-1*state.sortDir;if(av>bv)return 1*state.sortDir;return 0;
  });
  const all=DATA.map(enrich);
  const inScope=state.agent==='all'?all:all.filter(r=>r.agent===state.agent);
  const alerts=inScope.filter(r=>r.days>10).length;
  const avg=inScope.length?(inScope.reduce((s,r)=>s+r.days,0)/inScope.length).toFixed(1):0;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="lbl">סה״כ הזמנות בהכנה</div><div class="val">${inScope.length}</div></div>
    <div class="kpi"><div class="lbl">נציגים פעילים</div><div class="val">${new Set(inScope.map(r=>r.agent)).size}</div></div>
    <div class="kpi"><div class="lbl">ממוצע ימי עסקים</div><div class="val">${avg}</div></div>
    <div class="kpi ${alerts?'alert':''}"><div class="lbl">בהתראה (10+ ימים)</div><div class="val">${alerts}</div></div>`;
  const tb=document.getElementById('rows');
  tb.innerHTML=rows.map(r=>{
    const f=fmtDate(r.received);let badge,cls;
    if(r.days>10){badge='b-alert';cls='row-alert';}
    else if(r.days>=7){badge='b-warn';cls='';}
    else{badge='b-ok';cls='';}
    return `<tr class="${cls}">
      <td><span class="ordnum">${r.order}</span></td>
      <td><span class="agent-tag"><span class="dot" style="background:${agentColor[r.agent]||'#888'}"></span>${r.agent}</span></td>
      <td class="cust">${r.customer}</td>
      <td class="when"><b>${f.date}</b> <span class="time">${f.time?'· '+f.time:''}</span></td>
      <td><span class="days"><span class="badge ${badge}">${r.days} ימים</span></span></td>
    </tr>`;
  }).join('');
  document.getElementById('cnt').textContent=rows.length;
  document.querySelectorAll('thead th').forEach(th=>{
    const k=th.dataset.k;
    th.querySelector('.arr').textContent=k===state.sortKey?(state.sortDir===1?'▲':'▼'):'';
  });
}
function buildChips(){
  const agents=[...new Set(DATA.map(d=>d.agent))];
  agents.forEach((a,i)=>{if(!agentColor[a])agentColor[a]=palette[i%palette.length];});
  const c=document.getElementById('agentChips');
  const mk=(l,v)=>`<button class="chip ${state.agent===v?'active':''}" data-a="${v}">${l}</button>`;
  c.innerHTML=mk('כל הנציגים','all')+agents.map(a=>mk(a,a)).join('');
  c.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{state.agent=ch.dataset.a;buildChips();render();});
}
function setState(html,isErr){
  const s=document.getElementById('state');
  if(html===null){s.style.display='none';return;}
  s.style.display='block';s.className='state'+(isErr?' err':'');s.innerHTML=html;
}
async function load(){
  const btn=document.getElementById('refreshBtn');btn.classList.add('spin');
  if(CSV_URL.includes('PASTE_YOUR')){
    setState('⚠️ עדיין לא הוגדרה כתובת ה‑CSV.<br>פתח את הקובץ ועדכן את המשתנה <b>CSV_URL</b> בראש הסקריפט.',true);
    btn.classList.remove('spin');return;
  }
  try{
    const res=await fetch(CSV_URL+(CSV_URL.includes('?')?'&':'?')+'t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const txt=await res.text();
    DATA=rowsToObjects(parseCSV(txt));
    if(!DATA.length){setState('הגיליון ריק או שהכותרות לא תואמות (order, agent, customer, received).',true);}
    else{setState(null);buildChips();render();}
    const n=new Date();const p=x=>String(x).padStart(2,'0');
    document.getElementById('upd').textContent=`${p(n.getDate())}/${p(n.getMonth()+1)}/${n.getFullYear()} ${p(n.getHours())}:${p(n.getMinutes())}`;
  }catch(e){
    setState('שגיאה בטעינת הנתונים: '+e.message+'<br>ודא שהגיליון פורסם כ‑CSV ושהכתובת נכונה.',true);
  }
  btn.classList.remove('spin');
}
document.querySelectorAll('thead th').forEach(th=>{th.onclick=()=>{const k=th.dataset.k;if(state.sortKey===k)state.sortDir*=-1;else{state.sortKey=k;state.sortDir=k==='received'?-1:1;}render();};});
document.getElementById('q').oninput=e=>{state.q=e.target.value;render();};
document.getElementById('refreshBtn').onclick=load;
load();
setInterval(load,5*60*1000); // רענון אוטומטי כל 5 דקות
</script>
</body>
</html>
